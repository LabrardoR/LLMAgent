<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 聊天</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- 认证区域 -->
        <div id="auth-container">
            <div id="auth-form-container">
                <h2 id="auth-title">登录</h2>
                <form id="auth-form">
                    <input type="text" id="account" placeholder="账户" required>
                    <input type="password" id="password" placeholder="密码" required>
                    <button type="submit" id="auth-button">登录</button>
                </form>
                <p id="toggle-auth-mode">没有账户？ <a href="#" id="toggle-link">立即注册</a></p>
            </div>
        </div>

        <!-- 聊天区域 -->
        <div id="chat-container" class="hidden">
            <!-- 左侧会话列表 -->
            <div id="conversations-panel">
                <div id="conversations-header">
                    <h3>会话列表</h3>
                    <button id="new-chat-button">+ 新对话</button>
                </div>
                <div id="conversations-list"></div>
                <div id="user-panel">
                    <span id="username-display"></span>
                    <button id="logout-button">退出</button>
                </div>
            </div>

            <!-- 右侧聊天窗口 -->
            <div id="chat-panel">
                <div id="chat-messages"></div>
                <div id="chat-input-container">
                    <input type="text" id="chat-input" placeholder="输入消息...">
                    <button id="send-button">发送</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
